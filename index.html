<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholAris AI \u2014 Academic Research Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0D0F1C;
      --bg2:      #111428;
      --surface:  rgba(255,255,255,0.05);
      --surface2: rgba(255,255,255,0.09);
      --border:   rgba(255,255,255,0.10);
      --border2:  rgba(255,255,255,0.18);
      --ink:      #F0F2FF;
      --ink2:     rgba(240,242,255,0.55);
      --gold:     #D4AF6A;
      --gold2:    #F0CE8A;
      --blue:     #5B8DEF;
      --purple:   #8B6BE8;
      --teal:     #3EC6B8;
      --radius:   20px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* BACKGROUND ORBS */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 600px; height: 600px; background: rgba(91,141,239,0.18); top: -200px; left: -200px; }
    .orb2 { width: 500px; height: 500px; background: rgba(139,107,232,0.15); top: 40%; right: -150px; }
    .orb3 { width: 400px; height: 400px; background: rgba(212,175,106,0.10); bottom: 10%; left: 30%; }

    /* GRID LINES */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ALL CONTENT ABOVE BG */
    nav, .hero, .stats-bar, section, .screenshots-section,
    .download-section, footer, .lang-bar { position: relative; z-index: 1; }

    /* LANG TOGGLE */
    .lang-bar {
      position: fixed; top: 20px; right: 24px;
      z-index: 999;
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 4px;
      backdrop-filter: blur(20px);
    }
    .lang-bar button {
      border: none; background: transparent;
      padding: 5px 16px;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--ink2);
      transition: all .25s;
    }
    .lang-bar button.active {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #1a1200;
      font-weight: 600;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center;
      padding: 20px 40px;
      background: rgba(13,15,28,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links {
      margin-left: auto; margin-right: 130px;
      display: flex; gap: 32px; list-style: none;
    }
    .nav-links a {
      font-size: 14px; font-weight: 400;
      color: var(--ink2); text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 140px 24px 100px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(212,175,106,0.12);
      border: 1px solid rgba(212,175,106,0.35);
      color: var(--gold2);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 8px 20px; border-radius: 100px;
      margin-bottom: 36px;
      opacity: 0; animation: fadeUp .6s .1s forwards;
    }
    .hero-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold);
      animation: pulse 2s infinite;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 8vw, 100px);
      line-height: 1.0; letter-spacing: -2px;
      max-width: 920px;
      color: var(--ink);
      opacity: 0; animation: fadeUp .7s .2s forwards;
    }
    .hero h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--blue) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      margin-top: 28px;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 300; color: var(--ink2);
      max-width: 580px; line-height: 1.75;
      opacity: 0; animation: fadeUp .7s .35s forwards;
    }
    .hero-actions {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center; margin-top: 44px;
      opacity: 0; animation: fadeUp .7s .5s forwards;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: #1a1200;
      padding: 16px 32px; border-radius: 100px;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(212,175,106,0.35);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 36px rgba(212,175,106,0.5); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--ink);
      padding: 16px 32px; border-radius: 100px;
      font-size: 15px; font-weight: 500;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background .2s, border-color .2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3); }

    .scroll-hint {
      position: absolute; bottom: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0; animation: fadeUp .7s .9s forwards;
      color: var(--ink2); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    }
    .scroll-line {
      width: 1px; height: 52px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2.5s infinite;
    }

    /* STATS */
    .stats-bar {
      display: flex; justify-content: center; flex-wrap: wrap;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .stat-item {
      text-align: center; padding: 40px 56px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 44px; line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: 13px; font-weight: 300; color: var(--ink2); margin-top: 8px; }

    /* SECTIONS */
    .section-wrap { padding: 110px 24px; max-width: 1120px; margin: 0 auto; }
    .section-tag {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.1; letter-spacing: -1px;
      max-width: 640px; color: var(--ink);
    }
    .section-title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--gold), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .gold-line {
      width: 56px; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin-top: 24px; border-radius: 2px;
    }

    /* FEATURES */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1px;
      margin-top: 60px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .feature-card {
      background: var(--bg2);
      padding: 40px 36px;
      transition: background .25s;
      position: relative;
      overflow: hidden;
    }
    .feature-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,106,0.4), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .feature-card:hover { background: rgba(255,255,255,0.04); }
    .feature-card:hover::before { opacity: 1; }
    .feature-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(212,175,106,0.15), rgba(91,141,239,0.1));
      border: 1px solid rgba(212,175,106,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 22px;
    }
    .feature-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700;
      color: var(--ink); margin-bottom: 12px;
    }
    .feature-card p { font-size: 14px; font-weight: 300; color: var(--ink2); line-height: 1.7; }

    /* SCREENSHOTS SECTION */
    .screenshots-section { padding: 110px 24px; background: rgba(255,255,255,0.015); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .screenshots-inner { max-width: 1120px; margin: 0 auto; }

    .screens-row {
      display: flex; gap: 24px; margin-top: 60px;
      justify-content: center; flex-wrap: wrap;
    }
    .screen-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--border2);
      border-radius: 28px;
      width: 185px; aspect-ratio: 9/19;
      overflow: hidden; position: relative;
      transition: transform .35s, box-shadow .35s;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }
    .screen-card:hover { transform: translateY(-10px); box-shadow: 0 20px 56px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,106,0.2); }
    .screen-card:nth-child(2) { margin-top: 36px; }
    .screen-card:nth-child(4) { margin-top: 36px; }
    .screen-inner { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 18px 14px; }
    .screen-topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .screen-dot { width: 7px; height: 7px; border-radius: 50%; }
    .screen-title-text { font-family: 'Playfair Display', serif; font-size: 11px; color: var(--ink); opacity: 0.8; }
    .screen-content { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .screen-line { height: 7px; border-radius: 4px; background: rgba(255,255,255,0.09); }
    .screen-line.gold { background: rgba(212,175,106,0.35); }
    .screen-line.blue { background: rgba(91,141,239,0.3); }
    .screen-search {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 4px;
    }
    .screen-result {
      background: rgba(212,175,106,0.08);
      border: 1px solid rgba(212,175,106,0.15);
      border-radius: 8px; padding: 7px 9px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .screen-caption { text-align: center; margin-top: 14px; font-size: 12px; color: var(--ink2); font-weight: 300; }

    /* DOWNLOAD */
    .download-section { padding: 110px 24px; text-align: center; }
    .download-box {
      max-width: 660px; margin: 0 auto;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--border2);
      border-radius: 32px; padding: 72px 56px;
      position: relative; overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .download-box::before {
      content: '';
      position: absolute; top: -80px; right: -80px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(212,175,106,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .download-box::after {
      content: '';
      position: absolute; bottom: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(91,141,239,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .download-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 38px; letter-spacing: -1px;
      margin-bottom: 14px; color: var(--ink);
    }
    .download-box p { color: var(--ink2); font-weight: 300; margin-bottom: 40px; font-size: 17px; }
    .download-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 1; }
    .store-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border2);
      color: var(--ink);
      padding: 14px 26px; border-radius: 16px;
      font-size: 14px; font-weight: 500;
      text-decoration: none;
      transition: transform .2s, background .2s, box-shadow .2s;
      backdrop-filter: blur(10px);
    }
    .store-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
    .store-btn svg { width: 22px; height: 22px; fill: var(--gold2); }
    .store-btn-label { display: flex; flex-direction: column; align-items: flex-start; }
    .store-btn-label small { font-size: 10px; font-weight: 300; color: var(--ink2); }
    .store-btn-label span { font-size: 15px; font-weight: 600; }
    .coming-soon-badge {
      display: inline-block; margin-top: 20px;
      font-size: 12px; font-weight: 500;
      background: rgba(212,175,106,0.1);
      color: var(--gold2);
      border: 1px solid rgba(212,175,106,0.25);
      padding: 5px 16px; border-radius: 100px;
      position: relative; z-index: 1;
    }

    /* TEAM */
    .team-section { padding: 110px 24px; max-width: 1120px; margin: 0 auto; }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px; margin-top: 60px;
    }
    .team-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px; text-align: center;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      backdrop-filter: blur(10px);
    }
    .team-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      border-color: rgba(212,175,106,0.3);
    }
    .team-avatar {
      width: 76px; height: 76px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,175,106,0.2), rgba(91,141,239,0.15));
      border: 2px solid rgba(212,175,106,0.3);
      margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      color: var(--gold2);
    }
    .team-name { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 6px; color: var(--ink); }
    .team-role {
      font-size: 11px; font-weight: 600; letter
