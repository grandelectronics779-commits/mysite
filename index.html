<!DOCTYPE html>
<html>
<head>
  <title>Mini O'yin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #score {
      font-size: 24px;
      margin: 10px;
    }

    #gameArea {
      position: relative;
      width: 100%;
      height: 400px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      border-radius: 10px;
    }

    .ball {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #00ffcc;
      border-radius: 50%;
      cursor: pointer;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>🎮 Mini O'yin</h1>
<div id="score">Score: 0</div>
<button onclick="startGame()">Boshlash</button>

<div id="gameArea"></div>

<script>
let score = 0;
let gameInterval;

function startGame() {
  score = 0;
  document.getElementById("score").innerText = "Score: " + score;

  clearInterval(gameInterval);
  gameInterval = setInterval(createBall, 800);
}

function createBall() {
  const gameArea = document.getElementById("gameArea");

  const ball = document.createElement("div");
  ball.classList.add("ball");

  ball.style.top = Math.random() * 350 + "px";
  ball.style.left = Math.random() * (window.innerWidth - 50) + "px";

  ball.onclick = function () {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    ball.remove();
  };

  gameArea.appendChild(ball);

  setTimeout(() => {
    ball.remove();
  }, 1000);
}
</script>

</body>
</html>
